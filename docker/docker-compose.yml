services:
  db:
    image: postgres:15-alpine
    container_name: aalam_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aalam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aalam_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aalam_erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aalam} -d ${POSTGRES_DB:-aalam_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: aalam_erp_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aalam}:${POSTGRES_PASSWORD:-aalam_secret}@db:5432/${POSTGRES_DB:-aalam_erp}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend:/app
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: aalam_erp_frontend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  backend_storage:
